version: '3'

vars:
  DIST: ./dist

tasks:
  build:
    desc: Build all CLIs
    cmds:
      - go build -o {{.DIST}}/ws ./apps/ws

  build:ws:
    desc: Build ws CLI
    cmds:
      - go build -o {{.DIST}}/ws ./apps/ws
    sources:
      - apps/ws/**/*.go
      - libs/core/**/*.go
    generates:
      - "{{.DIST}}/ws"

  test:
    desc: Test all modules
    cmds:
      - go test ./...

  lint:
    desc: Lint all modules
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -w .

  tidy:
    desc: Tidy all modules
    cmds:
      - go work sync
      - cd apps/ws && go mod tidy
      - cd libs/core && go mod tidy

  install:
    desc: Install ws to ~/bin
    deps: [build:ws]
    cmds:
      - cp {{.DIST}}/ws ~/bin/ws
      - echo "Installed ws to ~/bin/ws"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.DIST}}
