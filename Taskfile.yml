version: '3'

vars:
  DIST: ./dist

tasks:
  build:
    desc: Build all CLIs
    deps: [build:ws, build:wt]

  build:ws:
    desc: Build ws CLI
    cmds:
      - go build -o {{.DIST}}/ws ./apps/ws
    sources:
      - apps/ws/**/*.go
      - libs/core/**/*.go
      - libs/relay/**/*.go
    generates:
      - "{{.DIST}}/ws"

  build:wt:
    desc: Build wt CLI
    cmds:
      - go build -o {{.DIST}}/wt ./apps/wt
    sources:
      - apps/wt/**/*.go
    generates:
      - "{{.DIST}}/wt"

  test:
    desc: Test all modules
    cmds:
      - cd libs/core && go test ./...
      - cd libs/relay && go test ./...
      - cd apps/ws && go test ./...
      - cd apps/wt && go test ./...

  lint:
    desc: Lint all modules
    cmds:
      - cd libs/core && golangci-lint run ./...
      - cd libs/relay && golangci-lint run ./...
      - cd apps/ws && golangci-lint run ./...
      - cd apps/wt && golangci-lint run ./...

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -w .

  tidy:
    desc: Tidy all modules
    cmds:
      - go work sync
      - cd apps/ws && go mod tidy
      - cd apps/wt && go mod tidy
      - cd libs/core && go mod tidy
      - cd libs/relay && go mod tidy

  install:
    desc: Install ws and wt to ~/bin
    deps: [build]
    cmds:
      - cp {{.DIST}}/ws ~/bin/ws
      - xattr -c ~/bin/ws
      - codesign -s - -f ~/bin/ws
      - cp {{.DIST}}/wt ~/bin/wt
      - xattr -c ~/bin/wt
      - codesign -s - -f ~/bin/wt
      - echo "Installed ws and wt to ~/bin/"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.DIST}}
